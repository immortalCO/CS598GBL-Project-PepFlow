name: pepflow-eval-rfdiffusion
channels:
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
      - numpy<2
      - scipy
      - pandas
      - pyyaml
      - tqdm
      - biopython
      - joblib
      - hydra-core==1.3.2
      - omegaconf
      - pyrsistent==0.19.3
      - e3nn==0.3.3
      - opt-einsum
      - decorator==5.1.0
      - pynvml==11.0.0
      - wandb==0.12.0
      - --extra-index-url https://download.pytorch.org/whl/cu116
      - torch==1.12.1+cu116
      - torchvision==0.13.1+cu116
      - torchaudio==0.12.1+cu116
      - --find-links https://data.dgl.ai/wheels/cu116/repo.html
      - dgl==1.0.2+cu116
      - "dllogger @ git+https://github.com/NVIDIA/dllogger.git"
      - "se3-transformer @ git+https://github.com/RosettaCommons/RFdiffusion.git@2d0c003df46b9db41d119321f15403dec3716cd9#subdirectory=env/SE3Transformer"
      - "rfdiffusion @ git+https://github.com/RosettaCommons/RFdiffusion.git@2d0c003df46b9db41d119321f15403dec3716cd9"

# Notes:
# - Target: `eval/run_rfdiffusion.py` (RFdiffusion branch).
# - This script also references `protein_generator/inference.py` via absolute path.
#   If you need ProteinGenerator branch too, set up that tool path separately.
