model:
  encoder:
    node_embed_size: 128
    edge_embed_size: 64
    ipa:
      c_s: 128
      c_z: 64
      c_hidden: 128
      no_heads: 8
      no_qk_points: 8
      no_v_points: 12
      seq_tfmr_num_heads: 4
      seq_tfmr_num_layers: 2
      num_blocks: 6
      stop_grad: false
  interpolant:
    min_t: 0.01
    t_normalization_clip: 0.9
    sample_sequence: true
    sample_structure: true
    rots:
      train_schedule: linear
      sample_schedule: exp
      exp_rate: 10
    trans:
      train_schedule: linear
      sample_schedule: linear
      sigma: 1.0
    seqs:
      num_classes: 20
      simplex_value: 5.0
    sampling:
      num_timesteps: 100
    self_condition: false
train:
  loss_weights:
    trans_loss: 0.5
    rot_loss: 0.5
    bb_atom_loss: 0.25
    seqs_loss: 1.0
    angle_loss: 1.0
    torsion_loss: 0.5
  max_iters: 8
  val_freq: 4
  batch_size: 2
  accum_grad: 1
  seed: 114514
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 0.0005
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 10
    min_lr: 5.0e-06
dataset:
  train:
    type: peprec
    structure_dir: ./Data/PepMerge_release
    dataset_dir: ./Data/lmdb
    name: pep_pocket_train
    reset: false
  val:
    type: peprec
    structure_dir: ./Data/PepMerge_release
    dataset_dir: ./Data/lmdb
    name: pep_pocket_test
    reset: false
